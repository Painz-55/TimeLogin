<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TimerTracker Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="loginScreen" class="login-overlay active">
        <div class="login-box">
            <h2>Acesso Restrito</h2>
            <input type="text" id="loginUser" placeholder="Usuario">
            <input type="password" id="loginPassword" placeholder="Senha">
            <button id="btnLogin">Entrar</button>
            <p id="loginError" style="color: #ff4c4c; font-size: 13px; margin-top: 10px;"></p>
        </div>
    </div>

    <div class="dashboard">
        <div class="leftPanel">
            <button id="exitObs" class="hidden">Exit OBS</button>
            <div class="mainTimer">
                <div id="bigTimer">00:00</div>
                <div id="bigLabel">No Timer Running</div>
            </div>
        </div>

        <div class="rightPanel">
            <div class="header">
                <div>
                    <p class="eyebrow">Painel sincronizado</p>
                    <h1>Boss Timers</h1>
                </div>
                <div class="headerActions">
                    <button id="addTimer">+</button>
                    <button id="removeTimer">-</button>
                    <button id="obsBtn">OBS</button>
                    <button id="adminUsersBtn" class="hidden">Onlines</button>
                    <button id="configBtn">&#9881;</button>
                    <button id="logoutBtn" class="secondary-btn hidden">Sair</button>
                </div>
            </div>
            <div id="timers"></div>
        </div>
    </div>

    <div id="configPanel" class="hidden">
        <button id="closeConfig">&#10006;</button>
        <h2>Configuracoes</h2>
        <div id="bossConfig"></div>
        <button id="addBoss">Add Boss</button>
        <br><br>
        <button id="saveConfig">Salvar</button>
    </div>

    <script type="module" src="app.js"></script>
    <audio id="alarmSound" src="alarm.mp3" preload="auto"></audio>
    <div id="adminUsersPanel" class="hidden admin-panel">
        <button id="closeAdminUsers">&#10006;</button>
        <h2>Usuarios logados</h2>
        <div id="adminUsersList"></div>
    </div>
</body>
</html>
